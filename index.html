<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Forge — Gym Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--bg-elev:#121212;--bg-elev-2:#1a1a1a;--border:#222;--border-strong:#333;--text:#f5f5f5;--text-dim:#a0a0a0;--text-faint:#606060;--accent:#d4a35c;--accent-dim:#8a6a3a;--danger:#c94a4a;--warn:#d9a441;--radius:10px;--radius-sm:6px;}
[data-theme="light"]{--bg:#f4f4f2;--bg-elev:#fff;--bg-elev-2:#ebebeb;--border:#ddd;--border-strong:#ccc;--text:#111;--text-dim:#555;--text-faint:#999;--accent:#b07d38;--accent-dim:#c8973f;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
body{min-height:100vh;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
h1,h2,h3,h4{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.02em;margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:15px}

header{padding:14px 16px 10px;position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding-top:calc(14px + env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:baseline;gap:8px}
.brand h1{font-size:20px;letter-spacing:.12em}
.brand .sub{font-size:10px;color:var(--text-faint);letter-spacing:.2em;text-transform:uppercase}
.theme-btn{padding:7px;border-radius:50%;border:1px solid var(--border);background:var(--bg-elev-2);color:var(--text-dim);width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s;flex-shrink:0;}
.theme-btn:hover{border-color:var(--accent-dim)}
.tools{display:flex;gap:8px;align-items:center;}

main{padding:8px 16px 24px}
.view{display:none;animation:fade .2s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

nav.tabbar{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg-elev);border-top:1px solid var(--border);padding:8px 4px;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:20;}
nav.tabbar button{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;color:var(--text-faint);font-size:10px;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;}
nav.tabbar button.active{color:var(--accent)}
nav.tabbar svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.6}
@media(max-width:760px){nav.tabbar{grid-auto-rows:auto;grid-template-columns:repeat(7,minmax(0,1fr));}}
@media(max-width:600px){nav.tabbar button{flex-direction:row;justify-content:center;gap:8px;padding:8px 6px;font-size:11px;}nav.tabbar button span{display:block;}nav.tabbar svg{display:none;}nav.tabbar button{border-radius:999px;background:rgba(212,163,92,.08);margin:2px 0;}}
.built-in-list{max-height:58vh;overflow-y:auto;padding-right:2px;}
.built-ctrl-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
@media(max-width:720px){.built-ctrl-row{grid-template-columns:1fr;}}
.built-card{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;cursor:default;transition:transform .15s,border-color .15s,box-shadow .15s;}
.built-card:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.08);}
.built-card .built-info{flex:1;min-width:0}
.built-card .built-name{font-size:14px;font-weight:600;letter-spacing:.01em;margin-bottom:4px;color:var(--text);}
.built-card .built-meta{font-size:12px;color:var(--text-faint);line-height:1.4;font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.built-card .cat-badge{display:inline-flex;align-items:center;font-size:11px;padding:4px 8px;border-radius:999px;border:1px solid;letter-spacing:.02em;}
.built-card button{white-space:nowrap;flex-shrink:0;}

.card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--text-dim)}.faint{color:var(--text-faint);font-size:12px}
.section-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin:18px 0 8px;opacity:.8}
.divider{height:1px;background:var(--border);margin:10px 0}

.btn{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-strong);background:var(--bg-elev-2);color:var(--text);font-size:13px;font-weight:500;transition:all .15s;}
.btn:hover{border-color:var(--accent-dim)}
.btn.primary{background:var(--accent);color:#111;border-color:var(--accent);font-weight:600}
.btn.primary:hover{filter:brightness(1.1)}
.btn.danger{color:var(--danger);border-color:#3a1f1f}
.btn.ghost{background:transparent;border-color:transparent;color:var(--text-dim)}
.btn.sm{padding:6px 10px;font-size:12px}.btn.lg{padding:13px 16px;font-size:14px}.btn.full{width:100%}

input[type="text"],input[type="number"],textarea,select{width:100%;padding:10px 12px;background:var(--bg-elev-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none;transition:border-color .15s;}
input:invalid,textarea:invalid,select:invalid{border-color:var(--danger)}
input:valid:focus,textarea:valid:focus,select:valid:focus{border-color:var(--accent)}
label{display:block;font-size:12px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.form-row{margin-bottom:11px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.fg5{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}

.tab-switch{display:flex;background:var(--bg-elev-2);border-radius:var(--radius-sm);padding:3px;margin-bottom:12px;border:1px solid var(--border);overflow-x:auto;gap:2px;}
.tab-switch::-webkit-scrollbar{display:none}
.tab-switch button{flex:0 0 auto;padding:7px 12px;font-size:12px;color:var(--text-dim);border-radius:4px;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap;}
.tab-switch button.active{background:var(--bg-elev);color:var(--text)}

.item-card{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;}
.item-card .info h4{font-size:14px;margin-bottom:3px;font-family:'Cinzel',serif;color:var(--text)}
.item-card .info .detail{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace}
.item-card .actions{display:flex;gap:6px;flex-shrink:0}

.cat-group{margin-bottom:6px}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(212,163,92,.08);border:1px solid var(--border-strong);border-radius:var(--radius-sm);cursor:pointer;font-family:'Cinzel',serif;font-size:13px;letter-spacing:.08em;color:var(--accent);font-weight:500;transition:all .15s;}
.cat-header:hover{background:rgba(212,163,92,.12)}
.cat-arrow{color:var(--text-faint);transition:transform .2s;display:inline-block}
.cat-header.open .cat-arrow{transform:rotate(90deg)}
.cat-body{display:none;padding:4px 0}
.cat-body.open{display:block}

.day-pill{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-elev);margin-bottom:10px;cursor:pointer;transition:all .15s;}
.day-pill:hover{border-color:var(--accent-dim)}
.day-pill .day-num{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--text-faint);text-transform:uppercase}
.day-pill .day-name{font-family:'Cinzel',serif;font-size:16px;margin-top:2px;color:var(--accent)}

.ex-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.ex-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;background:rgba(212,163,92,.04)}
.ex-head h3{font-family:'Cinzel',serif;font-size:15px;font-weight:500;letter-spacing:.03em;color:var(--accent)}
.ex-meta{font-size:12px;color:var(--text-dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.ex-body{padding:0 16px 14px;border-top:1px solid var(--border);display:none}
.ex-body.open{display:block}
.ex-tip{font-size:13px;color:var(--text-dim);line-height:1.55;margin:12px 0;padding:10px 12px;background:var(--bg-elev-2);border-left:2px solid var(--accent-dim);border-radius:4px}
.set-grid{display:grid;grid-template-columns:22px 1fr 1fr 24px;gap:8px;align-items:center;margin-bottom:6px}
.set-grid .idx{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-faint);text-align:center}
.set-grid input{padding:8px 10px;font-size:13px}
.set-hdr{display:grid;grid-template-columns:22px 1fr 1fr 24px;gap:8px;font-size:10px;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;padding:0 2px}
.set-chk{width:24px;height:24px;border-radius:4px;border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg-elev-2)}
.set-chk.done{background:var(--accent);border-color:var(--accent)}
.set-chk svg{width:14px;height:14px;stroke:#111;stroke-width:3;fill:none;display:none}
.set-chk.done svg{display:block}
.timer-row{display:flex;gap:8px;margin-top:10px;align-items:center}
.timer-disp{flex:1;font-family:'JetBrains Mono',monospace;font-size:22px;color:var(--accent);text-align:center;padding:8px;background:var(--bg-elev-2);border-radius:var(--radius-sm);border:1px solid var(--border)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.timer-disp.ticking{animation:pulse 1s infinite}

.mgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:14px}
.macro{padding:10px 6px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center}
.macro .n{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500}
.macro .l{font-size:9px;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.macro .bar{height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.macro .bar>div{height:100%;background:var(--accent);transition:width .3s}
.macro.over .bar>div{background:var(--danger)}.macro.warn .bar>div{background:var(--warn)}.macro.over .n{color:var(--danger)}
.meal-sec{margin-bottom:16px}
.meal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;padding:10px 12px;background:rgba(212,163,92,.06);border-radius:var(--radius-sm);margin-left:-12px;margin-right:-12px;padding-left:12px;padding-right:12px;}
.meal-head h3{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:500;flex:1}
.food-item{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer}
.food-item .fname{font-size:14px}
.food-item .fsub{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;margin-top:2px}
.food-item .fkcal{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-dim);flex-shrink:0}
.food-empty{padding:10px 12px;text-align:center;color:var(--text-faint);font-size:12px;border:1px dashed var(--border);border-radius:var(--radius-sm)}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:var(--bg-elev);padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border)}
.date-nav button{padding:6px 10px;color:var(--text-dim)}
.date-nav .dctr{font-weight:500;text-align:center;flex:1}
.date-nav .dsub{font-size:11px;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
.wday{padding:7px 3px;text-align:center;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-elev);cursor:pointer;font-size:11px}
.wday .wd{font-size:9px;color:var(--text-faint);letter-spacing:.1em;text-transform:uppercase}
.wday .wn{font-size:13px;margin-top:2px}
.wday .wk{font-size:10px;color:var(--text-dim);margin-top:3px;font-family:'JetBrains Mono',monospace}
.wday.active{border-color:var(--accent);background:rgba(212,163,92,.08)}
.wday.wtoday{border-color:var(--accent-dim)}

.lib-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.lib-head{padding:13px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;cursor:pointer;background:rgba(212,163,92,.04)}
.lib-head h3{font-family:'Cinzel',serif;font-size:14px;font-weight:500;color:var(--accent)}
.lib-meta{font-size:11px;color:var(--text-dim);margin-top:3px;font-family:'JetBrains Mono',monospace}
.lib-body{padding:0 16px 14px;border-top:1px solid var(--border);display:none}
.lib-body.open{display:block}
.lib-tip{font-size:13px;color:var(--text-dim);line-height:1.55;margin:10px 0;padding:10px 12px;background:var(--bg-elev-2);border-left:2px solid var(--accent-dim);border-radius:4px}

.prog-ex{padding:14px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px}
.prog-ex h3{font-family:'Cinzel',serif;font-size:14px;font-weight:500;margin-bottom:8px;color:var(--accent)}
.prog-log{font-size:12px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;line-height:1.7}

.recipe-card{padding:14px;background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;cursor:pointer;transition:all .15s}
.recipe-card:hover{border-color:var(--accent-dim);background:rgba(212,163,92,.03)}
.recipe-card h3{font-family:'Cinzel',serif;font-size:15px;font-weight:500;margin-bottom:4px;color:var(--accent)}
.recipe-card .rm{font-size:11px;color:var(--text-faint);font-family:'JetBrains Mono',monospace}

.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);max-height:580px}
.chat-msgs{flex:1;overflow-y:auto;padding-bottom:8px}
.msg{margin-bottom:10px;max-width:88%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.user{background:var(--accent);color:#111;margin-left:auto;border-bottom-right-radius:4px}
.msg.ai{background:var(--bg-elev);border:1px solid var(--border);border-bottom-left-radius:4px;white-space:pre-wrap}
.msg.ai.loading{color:var(--text-faint);font-style:italic}
.chat-in{display:flex;gap:8px;padding-top:10px;border-top:1px solid var(--border)}
.chat-in textarea{flex:1;resize:none;min-height:42px;max-height:120px}
.chat-in button:disabled{opacity:.5}

.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-back.active{display:flex;animation:fbg .2s}
@keyframes fbg{from{opacity:0}to{opacity:1}}
.modal{width:100%;max-width:560px;background:var(--bg-elev);border-top-left-radius:18px;border-top-right-radius:18px;border-top:1px solid var(--border-strong);padding:20px;padding-bottom:calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;animation:sup .22s ease;position:relative;}
@keyframes sup{from{transform:translateY(30px);opacity:0}to{transform:none;opacity:1}}
.modal h2{font-size:17px;margin-bottom:14px;letter-spacing:.04em}
.mcls{position:absolute;top:14px;right:14px;color:var(--text-dim);font-size:24px;line-height:1;padding:4px 10px}

.loading{opacity:.6;pointer-events:none;position:relative}
.loading::after{content:'';position:absolute;top:50%;left:50%;width:20px;height:20px;border:2px solid var(--accent);border-top:2px solid transparent;border-radius:50%;animation:spin 1s linear infinite;transform:translate(-50%,-50%)}
@keyframes spin{0%{transform:translate(-50%,-50%) rotate(0deg)}100%{transform:translate(-50%,-50%) rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);padding:9px 16px;background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:var(--radius);font-size:13px;z-index:100;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.toast.warn{border-color:var(--warn);color:var(--warn)}
.toast.danger{border-color:var(--danger);color:var(--danger)}
.toast.success{border-color:var(--accent);color:var(--accent)}

.empty{padding:30px 20px;text-align:center;color:var(--text-faint)}
.empty .big{font-size:38px;margin-bottom:10px;opacity:.4}
</style>
</head>
<body>

<header>
  <div class="brand"><h1>FORGE</h1><span class="sub">Gym Journal</span></div>
  <div class="tools">
    <button class="btn ghost sm" id="help-btn">?</button>
    <button class="btn ghost sm" id="import-data">⤴</button>
    <button class="btn ghost sm" id="export-data">⤓</button>
    <button class="theme-btn" id="theme-btn">🌙</button>
  </div>
</header>

<main>
<section id="view-workout" class="view active">
  <div id="wk-list">
    <div class="row" style="margin-bottom:12px">
      <div class="section-title" style="margin:0">Your Workouts</div>
      <button class="btn primary lg" id="add-day-btn">+ New Day</button>
    </div>
    <div id="wk-days"></div>
  </div>
  <div id="wk-detail" style="display:none">
    <button class="btn ghost sm" id="back-btn" style="margin-bottom:10px">← Back</button>
    <div id="wk-content"></div>
  </div>
</section>

<section id="view-progress" class="view">
  <div class="section-title">Progress Log</div>
  <div id="prog-list"></div>
</section>

<section id="view-nutrition" class="view">
  <div class="tab-switch" id="ntabs">
    <button data-nt="today" class="active">Today</button>
    <button data-nt="week">Week</button>
    <button data-nt="goals">Goals</button>
  </div>
  <div id="nt-today">
    <div class="date-nav">
      <button id="dt-prev">←</button>
      <div class="dctr"><div id="dt-label"></div><div class="dsub" id="dt-sub"></div></div>
      <button id="dt-next">→</button>
    </div>
    <div id="nutri-summary"></div>
    <div class="mgrid" id="mgrid"></div>
    <div id="meals-cont"></div>
  </div>
  <div id="nt-week" style="display:none">
    <div class="week-grid" id="wkgrid"></div>
    <div id="wk-summary"></div>
  </div>
  <div id="nt-goals" style="display:none">
    <div class="section-title">Daily Targets</div>
    <div class="card">
      <div class="form-row"><label>Calories (kcal)</label><input type="number" id="g-kcal"/></div>
      <div class="fg2">
        <div class="form-row"><label>Protein (g)</label><input type="number" id="g-prot"/></div>
        <div class="form-row"><label>Carbs (g)</label><input type="number" id="g-carb"/></div>
      </div>
      <div class="fg2">
        <div class="form-row"><label>Fat (g)</label><input type="number" id="g-fat"/></div>
        <div class="form-row"><label>Fiber (g)</label><input type="number" id="g-fib"/></div>
      </div>
      <button class="btn primary full" id="save-goals">Save Targets</button>
      <div class="faint" style="margin-top:10px;line-height:1.55">~0.8–1g protein/lb bodyweight for muscle. Aim 25–35g fiber daily.</div>
    </div>
  </div>
</section>

<section id="view-myfoods" class="view">
  <div class="row" style="margin-bottom:12px">
    <div class="section-title" style="margin:0">My Foods</div>
    <button class="btn primary lg" id="add-food-btn">+ New Food</button>
  </div>
  <div class="form-row"><input type="text" id="mf-search" placeholder="Search foods..."/></div>
  <div id="mf-list"></div>
</section>

<section id="view-recipes" class="view">
  <div class="row" style="margin-bottom:12px">
    <div class="section-title" style="margin:0">My Recipes</div>
    <button class="btn primary lg" id="add-rec-btn">+ New Recipe</button>
  </div>

const DB_KEY = 'forge_v3';
const DEF = {theme:'dark',goals:{kcal:2400,protein:160,carbs:260,fat:75,fiber:30},workoutDays:[],myFoods:[],recipes:[],customExercises:[],foodLog:{},workoutLog:{},progressionLog:[],chat:[],aiKey:''};
function deepMerge(target, source){for(const key in source){if(source[key] && typeof source[key]==='object' && !Array.isArray(source[key]) && target[key] && typeof target[key]==='object' && !Array.isArray(target[key])){deepMerge(target[key], source[key]);} else {target[key]=source[key];}}}
let DB = (() => {try{const r=localStorage.getItem(DB_KEY);const base=JSON.parse(JSON.stringify(DEF));if(r){deepMerge(base, JSON.parse(r));}return base;}catch(e){return JSON.parse(JSON.stringify(DEF));}})();
function saveDB(){try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){toast('Storage error - data not saved','danger');}}

const shiftD=(iso,d)=>{const dt=new Date(iso+'T12:00:00');dt.setDate(dt.getDate()+d);return dt.toISOString().slice(0,10);};

const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  const k=e.key.toLowerCase();
  if(e.ctrlKey||e.metaKey){
    if(k==='1')document.querySelector('[data-view="workout"]').click();
    else if(k==='2')document.querySelector('[data-view="progress"]').click();

function renderWorkoutList(){
  document.getElementById('wk-detail').style.display='none';
  document.getElementById('wk-list').style.display='block';
  const done=Object.keys(DB.workoutLog[toISO()]||{})[0];
  let html=DB.workoutDays.length?DB.workoutDays.map((d,i)=>`
    <div class="day-pill" data-i="${i}">
      <div><div class="day-num">${done===d.id?'✓ logged today':d.exercises.length+' exercises'}</div><div class="day-name">${esc(d.name)}</div></div>
      <div class="muted">›</div>
    </div>`).join(''):`<div class="empty"><div class="big">⚒</div><div>No workout days yet.</div><div class="faint" style="margin-top:6px">Tap + New Day to create your first.</div></div>`;
  document.getElementById('wk-days').innerHTML=html;
  document.querySelectorAll('.day-pill').forEach(p=>p.addEventListener('click',()=>openDay(+p.dataset.i)));
}

function openDay(idx){
  const day=DB.workoutDays[idx];
  document.getElementById('wk-list').style.display='none';
  document.getElementById('wk-detail').style.display='block';
  const today=toISO();
  DB.workoutLog[today]=DB.workoutLog[today]||{};
  const log=DB.workoutLog[today][day.id]=DB.workoutLog[today][day.id]||{};
  let html=`<div class="row" style="margin-bottom:14px">
    <div><h2 style="font-size:20px">${esc(day.name)}</h2><div class="faint">${day.exercises.length} exercises</div></div>
    <button class="btn sm" id="edit-day-btn">Edit Day</button>
  </div>`;
  day.exercises.forEach((ex,ei)=>{
    log[ex.name]=log[ex.name]||Array.from({length:ex.sets},()=>({w:'',r:'',done:false}));
    const sets=log[ex.name];
    html+=`<div class="ex-card" data-ei="${ei}">
      <div class="ex-head"><div><h3>${esc(ex.name)}</h3><div class="ex-meta">${ex.sets} × ${esc(ex.reps)} · rest ${ex.rest}s</div></div><div class="muted">▾</div></div>
      <div class="ex-body">
        <div class="ex-tip">${esc(ex.tip||'No form tip added.')}</div>
        <div class="set-hdr"><div></div><div>Weight</div><div>Reps</div><div></div></div>
        ${sets.map((s,si)=>`<div class="set-grid" data-si="${si}">
          <div class="idx">${si+1}</div>
          <input type="text" inputmode="decimal" placeholder="lbs/kg" value="${esc(s.w)}" data-f="w"/>
          <input type="text" inputmode="numeric" placeholder="reps" value="${esc(s.r)}" data-f="r"/>
          <div class="set-chk ${s.done?'done':''}" data-done><svg viewBox="0 0 24 24"><polyline points="4,12 10,18 20,6"/></svg></div>
        </div>`).join('')}
        <div class="timer-row">
          <button class="btn sm" data-tstart>Start rest (${ex.rest}s)</button>
          <div class="timer-disp" data-tdisp>—</div>
        </div>
      </div>
    </div>`;
  });
  html+=`<button class="btn primary full" id="save-sess" style="margin-top:10px">Save Session</button>`;
  document.getElementById('wk-content').innerHTML=html;
  document.getElementById('edit-day-btn').addEventListener('click',()=>openEditDay(idx));
  if(day.exercises.length) document.querySelector('.ex-card .ex-body').classList.add('open');
  document.querySelectorAll('.ex-card').forEach(card=>{
    const ei=+card.dataset.ei;const ex=day.exercises[ei];
    card.querySelector('.ex-head').addEventListener('click',()=>card.querySelector('.ex-body').classList.toggle('open'));
    card.querySelectorAll('.set-grid').forEach(sg=>{
      const si=+sg.dataset.si;
      sg.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',()=>{DB.workoutLog[today][day.id][ex.name][si][inp.dataset.f]=inp.value;saveDB();}));
      sg.querySelector('[data-done]').addEventListener('click',e=>{
        const cur=DB.workoutLog[today][day.id][ex.name][si].done;
        DB.workoutLog[today][day.id][ex.name][si].done=!cur;saveDB();
        e.currentTarget.classList.toggle('done');if(!cur)startTimer(card,ex.rest);
      });
    });
    card.querySelector('[data-tstart]').addEventListener('click',()=>startTimer(card,ex.rest));
  });
  document.getElementById('save-sess').addEventListener('click',()=>{
    const entry={date:today,dayName:day.name,exercises:[]};
    day.exercises.forEach(ex=>{const sets=(log[ex.name]||[]).filter(s=>s.w||s.r);if(sets.length)entry.exercises.push({name:ex.name,sets:sets.map(s=>({w:s.w,r:s.r}))});});
    DB.progressionLog=DB.progressionLog.filter(e=>!(e.date===today&&e.dayName===day.name));
    DB.progressionLog.push(entry);saveDB();toast('Session saved');
    renderWorkoutList();document.querySelector('[data-view="workout"]').click();
  });
}

function startTimer(card,sec){
  const d=card.querySelector('[data-tdisp]');if(card._ti)clearInterval(card._ti);
  let r=sec;d.classList.add('ticking');d.textContent=fmt(r);
  card._ti=setInterval(()=>{r--;d.textContent=fmt(r);if(r<=0){clearInterval(card._ti);d.classList.remove('ticking');d.textContent='DONE';if(navigator.vibrate)navigator.vibrate([150,80,150]);try{const a=new AudioContext(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=660;g.gain.value=0.15;o.start();setTimeout(()=>{o.stop();a.close();},300);}catch(e){}}},1000);
}
const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;

document.getElementById('add-day-btn').addEventListener('click',()=>{

    <button class="btn primary full" id="nd-ok">Create Day</button>`);

    if(!name){toast('Name required','danger');return;}
    DB.workoutDays.push({id:uid(),name,exercises:[]});saveDB();closeModal();renderWorkoutList();openEditDay(DB.workoutDays.length-1);
  });
});

function openEditDay(idx){
  const day=DB.workoutDays[idx];
  openModal(`<h2>Edit: ${esc(day.name)}</h2>
    <div class="form-row"><label>Day Name</label><input type="text" id="ed-name" value="${esc(day.name)}"/></div>
    <div class="section-title">Exercises</div>
    <div id="ed-exlist"></div>
    <button class="btn sm full" id="ed-add" style="margin-bottom:8px">+ Add from Library</button>
    <button class="btn primary full" id="ed-save" style="margin-bottom:6px">Save Changes</button>
    <button class="btn danger full" id="ed-del">Delete Day</button>`);

  const reRender=()=>{
    document.getElementById('ed-exlist').innerHTML=day.exercises.map((ex,i)=>`
      <div class="item-card"><div class="info"><h4>${esc(ex.name)}</h4><div class="detail">${ex.sets}×${ex.reps} · ${ex.rest}s</div></div>
      <button class="btn sm ghost" data-rm="${i}">✕</button></div>`).join('')||'<div class="food-empty" style="margin-bottom:8px">No exercises yet</div>';
    document.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();day.exercises.splice(+b.dataset.rm,1);reRender();}));
  };
  reRender();

  document.getElementById('ed-add').addEventListener('click',()=>{
    const allCats=[...LIB_CATS,'Custom'];
    let tabs=allCats.map((c,i)=>`<button data-pc="${c}" class="${i===0?'active':''}">${c}</button>`).join('');
    openModal(`<h2>Add Exercise</h2><div class="tab-switch" id="pc-tabs">${tabs}</div><div id="pc-body"></div>`);
    const showCat=cat=>{
      const exs=cat==='Custom'?(DB.customExercises||[]):(LIBRARY[cat]||[]);
      document.getElementById('pc-body').innerHTML=exs.map((ex,i)=>{
        const exists=day.exercises.some(e=>e.name===ex.name);
        return `<div class="item-card ${exists?'selected':''}"><div class="info"><h4>${esc(ex.name)}</h4><div class="detail">${ex.sets}×${ex.reps} · ${ex.rest}s</div></div>
          <button class="btn sm primary" data-pex="${i}" data-pcat="${cat}" ${exists?'disabled':''}>${exists?'Added':'Add'}</button></div>`;
      }).join('')||'<div class="food-empty">None here yet</div>';
      document.querySelectorAll('[data-pex]').forEach(b=>b.addEventListener('click',e=>{
        const cat2=b.dataset.pcat;const arr=cat2==='Custom'?(DB.customExercises||[]):(LIBRARY[cat2]||[]);
        const ex=arr[+b.dataset.pex];
        if(day.exercises.some(item=>item.name===ex.name)){
          toast('Already in this day','warn');
          return;
        }
        e.stopPropagation();
        day.exercises.push({...ex});
        saveDB();
        reRender();
        toast(`Added to ${day.name}`);
        showCat(cat2);
      }));
    };
    showCat(allCats[0]);
    document.querySelectorAll('[data-pc]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-pc]').forEach(x=>x.classList.remove('active'));b.classList.add('active');showCat(b.dataset.pc);}));
  });

  document.getElementById('ed-save').addEventListener('click',()=>{day.name=document.getElementById('ed-name').value.trim()||day.name;saveDB();closeModal();renderWorkoutList();toast('Day updated');});
  document.getElementById('ed-del').addEventListener('click',()=>{if(confirm('Delete this day?')){DB.workoutDays.splice(idx,1);saveDB();closeModal();renderWorkoutList();}});
}

function renderProgress(){
  const by={};
  DB.progressionLog.forEach(e=>e.exercises.forEach(x=>{by[x.name]=by[x.name]||[];by[x.name].push({date:e.date,sets:x.sets});}));
  const names=Object.keys(by).sort();
  document.getElementById('prog-list').innerHTML=names.length?names.map(n=>{
    const es=by[n].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,6);
    return `<div class="prog-ex"><h3>${esc(n)}</h3><div class="prog-log">${es.map(e=>`<div>${fmtShort(e.date)} ${e.date.slice(5)} &nbsp; <span style="color:var(--text)">${esc(e.sets.map(s=>(s.w||'-')+'×'+(s.r||'-')).join(' · '))}</span></div>`).join('')}</div></div>`;
  }).join(''):`<div class="empty"><div class="big">📈</div><div>No sessions logged yet.</div></div>`;
}

document.querySelectorAll('[data-nt]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-nt]').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  ['today','week','goals'].forEach(t=>document.getElementById('nt-'+t).style.display=t===b.dataset.nt?'block':'none');
  if(b.dataset.nt==='week')renderWeek();if(b.dataset.nt==='goals')loadGoals();if(b.dataset.nt==='today')renderNutrition();
}));

function renderNutrition(){
  document.getElementById('dt-label').textContent=fmtFull(curDate);
  document.getElementById('dt-sub').textContent=curDate===toISO()?'TODAY':'';
  const day=DB.foodLog[curDate]||{};
  const tot={kcal:0,p:0,c:0,f:0,fib:0};
  MEALS.forEach(m=>(day[m]||[]).forEach(i=>{tot.kcal+=i.kcal||0;tot.p+=i.p||0;tot.c+=i.c||0;tot.f+=i.f||0;tot.fib+=i.fiber||0;}));
  const G=DB.goals;
  document.getElementById('mgrid').innerHTML=[{l:'kcal',v:Math.round(tot.kcal),g:G.kcal},{l:'protein',v:Math.round(tot.p),g:G.protein},{l:'carbs',v:Math.round(tot.c),g:G.carbs},{l:'fat',v:Math.round(tot.f),g:G.fat},{l:'fiber',v:Math.round(tot.fib),g:G.fiber}]
    .map(m=>{const pct=m.g?(m.v/m.g)*100:0;const cls=pct>110?'over':pct>95?'warn':'';return `<div class="macro ${cls}"><div class="n">${m.v}<span style="font-size:9px;color:var(--text-faint)">/${m.g}</span></div><div class="l">${m.l}</div><div class="bar"><div style="width:${Math.min(100,pct)}%"></div></div></div>`;}).join('');
  let html='';
  MEALS.forEach(m=>{
    const items=day[m]||[];const mTot=items.reduce((a,i)=>a+(i.kcal||0),0);
    html+=`<div class="meal-sec"><div class="meal-head"><h3>${m}</h3><button class="btn primary lg" data-am="${m}">+ Add</button><span class="faint">${Math.round(mTot)} kcal</span></div>
      ${items.length?items.map((it,i)=>`<div class="food-item" data-fm="${m}" data-fi="${i}"><div><div class="fname">${esc(it.name)}</div><div class="fsub">${esc(it.unit)}${it.qty!==1?' ×'+it.qty:''} · P${Math.round(it.p)} C${Math.round(it.c)} F${Math.round(it.f)} Fib${Math.round(it.fiber||0)}</div></div><div class="fkcal">${Math.round(it.kcal)}</div></div>`).join(''):'<div class="food-empty">Nothing logged</div>'}
    </div>`;
  });
  document.getElementById('nutri-summary').innerHTML=`<div class="card"><div class="row"><span class="muted">Calories</span><span>${Math.round(tot.kcal)} / ${G.kcal} kcal</span></div><div class="divider"></div><div class="row"><span class="muted">Remaining</span><span>${tot.kcal<=G.kcal?Math.round(G.kcal-tot.kcal)+' kcal left':'-'+Math.round(tot.kcal-G.kcal)+' over'}</span></div></div>`;
  document.getElementById('meals-cont').innerHTML=html;
  document.querySelectorAll('[data-am]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openAddFood(b.dataset.am);}));
  document.querySelectorAll('.food-item').forEach(el=>el.addEventListener('click',()=>openEditLoggedFood(el.dataset.fm,+el.dataset.fi)));
}

function addFoodItem(meal,item){
  DB.foodLog[curDate]=DB.foodLog[curDate]||{};DB.foodLog[curDate][meal]=DB.foodLog[curDate][meal]||[];DB.foodLog[curDate][meal].push(item);saveDB();renderNutrition();
  const tot=MEALS.reduce((a,m)=>{(DB.foodLog[curDate][m]||[]).forEach(i=>a+=i.kcal);return a;},0);
  if(tot>DB.goals.kcal)toast(`Over calorie target (+${Math.round(tot-DB.goals.kcal)} kcal)`,'warn');
}

function renderWeek(){
  const today=new Date();const dow=(today.getDay()+6)%7;const start=new Date(today);start.setDate(today.getDate()-dow);
  const days=Array.from({length:7},(_,i)=>{const d=new Date(start);d.setDate(start.getDate()+i);return d.toISOString().slice(0,10);});
  const ts=toISO();
  document.getElementById('wkgrid').innerHTML=days.map(iso=>{
    const day=DB.foodLog[iso]||{};let kcal=0;MEALS.forEach(m=>(day[m]||[]).forEach(i=>kcal+=i.kcal||0));
    return `<div class="wday ${iso===ts?'wtoday':''} ${iso===curDate?'active':''}" data-iso="${iso}"><div class="wd">${fmtShort(iso).slice(0,3)}</div><div class="wn">${iso.slice(8,10)}</div><div class="wk">${Math.round(kcal)||'—'}</div></div>`;
  }).join('');
  document.querySelectorAll('.wday').forEach(el=>el.addEventListener('click',()=>{curDate=el.dataset.iso;document.querySelector('[data-nt="today"]').click();}));
  let tot={kcal:0,ld:0};days.forEach(iso=>{const d=DB.foodLog[iso];if(!d)return;let h=false;MEALS.forEach(m=>(d[m]||[]).forEach(i=>{tot.kcal+=i.kcal;h=true;}));if(h)tot.ld++;});
  document.getElementById('wk-summary').innerHTML=`<div class="card"><div class="row"><span class="muted">Days logged</span><span>${tot.ld}/7</span></div><div class="divider"></div><div class="row"><span class="muted">Avg calories</span><span>${tot.ld?Math.round(tot.kcal/tot.ld):0} kcal</span></div><div class="row" style="margin-top:4px"><span class="muted">Target</span><span>${DB.goals.kcal} kcal</span></div></div>`;
}

  const r=DB.recipes[i];
  openModal(`<h2>${esc(r.name)}</h2><div class="faint" style="margin-bottom:12px">${r.servings} servings · per serving: ${Math.round(r.kcal)} kcal · P${Math.round(r.p)} C${Math.round(r.c)} F${Math.round(r.f)} Fib${Math.round(r.fiber||0)}</div>
    <div class="section-title" style="margin-top:0">Ingredients</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6">${esc(r.ingredients||'—').replace(/\n/g,'<br/>')}</div>
    <div class="section-title">Instructions</div><div style="font-size:13px;color:var(--text-dim);line-height:1.6">${esc(r.instructions||'—').replace(/\n/g,'<br/>')}</div>
    <div style="display:flex;gap:8px;margin-top:14px"><button class="btn" id="er-edit" style="flex:1">Edit</button><button class="btn danger" id="er-del" style="flex:1">Delete</button></div>`);
  document.getElementById('er-edit').addEventListener('click',()=>{closeModal();openRecipeForm(i);});
  document.getElementById('er-del').addEventListener('click',()=>{if(confirm('Delete?')){DB.recipes.splice(i,1);saveDB();closeModal();renderRecipes();}});
}

function openRecipeForm(editIdx){
  const r=editIdx===null?{name:'',servings:1,ingredients:'',instructions:'',kcal:0,p:0,c:0,f:0,fiber:0}:DB.recipes[editIdx];
  openModal(`<h2>${editIdx===null?'New Recipe':'Edit Recipe'}</h2>
    <div class="form-row"><label>Name</label><input type="text" id="r-name" value="${esc(r.name)}" autofocus/></div>
    <div class="form-row"><label>Total Servings</label><input type="number" id="r-serv" value="${r.servings}" min="1" step="0.5"/></div>
    <div class="form-row"><label>Ingredients (one per line)</label><textarea id="r-ing" rows="4">${esc(r.ingredients)}</textarea></div>
    <div class="form-row"><label>Instructions</label><textarea id="r-inst" rows="3">${esc(r.instructions)}</textarea></div>
    <div class="section-title">Macros per serving</div>
    <div class="fg5">
      <div class="form-row"><label>Kcal</label><input type="number" id="r-k" value="${r.kcal}"/></div>
      <div class="form-row"><label>Prot</label><input type="number" id="r-p" value="${r.p}"/></div>
      <div class="form-row"><label>Carb</label><input type="number" id="r-c" value="${r.c}"/></div>
      <div class="form-row"><label>Fat</label><input type="number" id="r-f" value="${r.f}"/></div>
      <div class="form-row"><label>Fiber</label><input type="number" id="r-fb" value="${r.fiber||0}"/></div>
    </div>
    <button class="btn primary full" id="r-ok" style="margin-top:6px">${editIdx===null?'Create Recipe':'Save Changes'}</button>`);
  document.getElementById('r-ok').addEventListener('click',()=>{
    const obj={id:r.id||uid(),name:document.getElementById('r-name').value.trim(),servings:+document.getElementById('r-serv').value||1,ingredients:document.getElementById('r-ing').value,instructions:document.getElementById('r-inst').value,kcal:+document.getElementById('r-k').value||0,p:+document.getElementById('r-p').value||0,c:+document.getElementById('r-c').value||0,f:+document.getElementById('r-f').value||0,fiber:+document.getElementById('r-fb').value||0};
    if(!obj.name){toast('Name required','danger');return;}
    if(editIdx===null)DB.recipes.push(obj);else DB.recipes[editIdx]=obj;
    saveDB();closeModal();renderRecipes();toast('Recipe saved');
  });
}

/* ================================================================
   AI COACH
   ================================================================ */
function renderChat(){
  const m=document.getElementById('chat-msgs');
  renderAIStatus();
  m.innerHTML=DB.chat.length?DB.chat.map(msg=>`<div class="msg ${msg.role==='user'?'user':'ai'}">${esc(msg.content)}</div>`).join(''):`<div class="msg ai">I'm your training coach. Ask me about exercise form, swaps, nutrition, or anything about your plan.</div>`;
  m.scrollTop=m.scrollHeight;
  const settingsBtn=document.getElementById('ai-settings');if(settingsBtn){settingsBtn.onclick=openAISettings;}
}
document.getElementById('chat-send').addEventListener('click',sendChat);
document.getElementById('chat-in').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}});
async function sendChat(){
  const inp=document.getElementById('chat-in');const q=inp.value.trim();if(!q)return;
  DB.chat.push({role:'user',content:q});inp.value='';saveDB();renderChat();
  if(!DB.aiKey){DB.chat.push({role:'assistant',content:'AI not configured. Open AI settings to add a key and get real responses.'});saveDB();renderChat();return;}
  const m=document.getElementById('chat-msgs');const loading=document.createElement('div');loading.className='msg ai loading';loading.textContent='Thinking...';m.appendChild(loading);m.scrollTop=m.scrollHeight;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.aiKey},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are a knowledgeable gym and nutrition coach. User is returning to training after 5-6 years, doing kettlebell + bodyweight workouts at home. Macro targets: ${DB.goals.kcal} kcal, ${DB.goals.protein}g protein, ${DB.goals.carbs}g carbs, ${DB.goals.fat}g fat, ${DB.goals.fiber}g fiber. Keep answers under 150 words unless more is genuinely needed. Be practical, safe, and direct.`,messages:DB.chat.slice(-10).map(x=>({role:x.role==='user'?'user':'assistant',content:x.content}))})});
    const data=await res.json();loading.remove();
    const text=data.content?.filter(i=>i.type==='text').map(i=>i.text).join('\n')||'Could not get a response. Try again.';
    DB.chat.push({role:'assistant',content:text});saveDB();renderChat();
  }catch(e){loading.remove();DB.chat.push({role:'assistant',content:'Connection error. Try again.'});saveDB();renderChat();}
}

/* ── INIT ─────────────────────────────────────────────────────── */
renderWorkoutList();loadGoals();
</script>
